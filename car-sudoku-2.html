<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Car Sudoku #2 — Carcophony</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --purple:#5a4bc8;
  --purple-light:#7b6dd4;
  --purple-dark:#3d3490;
  --purple-bg:#eeeaff;
  --purple-mid:#c4bef0;
  --gold:#c9a84c;
  --white:#ffffff;
  --text:#1a1040;
  --muted:#8a80b8;
  --correct:#2ecc71;
  --error:#e74c3c;
  --cell-size:min(15vw, 88px);
}
html,body{height:100%;width:100%;overflow-x:hidden;}
body{
  font-family:'Raleway',sans-serif;
  background:linear-gradient(145deg,#4a6fe3 0%,#7b4bc8 50%,#9b3eb5 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 12px 32px;
}

/* HEADER */
header{
  width:100%;
  max-width:500px;
  text-align:center;
  margin-bottom:16px;
}
.brand{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:3px;
  color:rgba(255,255,255,0.6);
  margin-bottom:4px;
}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,8vw,52px);
  color:#fff;
  letter-spacing:3px;
  line-height:1;
  margin-bottom:4px;
}
.subtitle{
  font-size:13px;
  color:rgba(255,255,255,0.7);
  letter-spacing:1px;
}

/* CARD */
.card{
  width:100%;
  max-width:500px;
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

/* STATS BAR */
.stats{
  display:flex;
  justify-content:space-around;
  padding:12px 16px;
  background:var(--purple-bg);
  border-bottom:1px solid var(--purple-mid);
}
.stat{text-align:center;}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--purple);letter-spacing:1px;}

/* GRID */
.grid-wrap{padding:14px;}
.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:3px;
  width:100%;
  aspect-ratio:1;
}
.cell{
  position:relative;
  aspect-ratio:1;
  border-radius:6px;
  cursor:pointer;
  overflow:hidden;
  transition:transform 0.1s, box-shadow 0.1s;
  border:2px solid transparent;
}
.cell.given{cursor:default;}
.cell.empty{background:var(--purple-bg);border-color:var(--purple-mid);display:flex;align-items:center;justify-content:center;}
.cell.empty::after{content:'?';font-family:'Bebas Neue',sans-serif;font-size:calc(var(--cell-size)*0.4);color:var(--purple-mid);}
.cell.filled{border-color:var(--purple-mid);}
.cell.selected{border-color:var(--purple)!important;box-shadow:0 0 0 3px var(--purple-light);transform:scale(1.05);z-index:2;}
.cell.error{border-color:var(--error)!important;animation:shake 0.3s;}

.cell img{width:100%;height:100%;object-fit:cover;display:block;}
.cell-num{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:calc(var(--cell-size)*0.45);
  color:#fff;
  text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 3px 6px rgba(0,0,0,0.5);
  pointer-events:none;
  line-height:1;
}

/* BOX DIVIDERS */
.cell:nth-child(3n){margin-right:4px;}
.box-row-gap{margin-bottom:4px;}

/* CAR PICKER */
.picker-label{
  text-align:center;
  font-size:11px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  padding:0 14px 8px;
}
.picker{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  padding:0 14px 14px;
}
.pick-car{
  position:relative;
  aspect-ratio:1;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid var(--purple-mid);
  transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
}
.pick-car:hover{transform:scale(1.06);border-color:var(--purple);}
.pick-car.active{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold);transform:scale(1.08);}
.pick-car img{width:100%;height:100%;object-fit:cover;display:block;}
.pick-num{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(16px,4vw,28px);
  color:#fff;
  text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;
  pointer-events:none;
}
.pick-name{
  position:absolute;
  bottom:0;left:0;right:0;
  background:rgba(90,75,200,0.85);
  font-size:8px;
  color:#fff;
  text-align:center;
  padding:2px 1px;
  font-weight:700;
  letter-spacing:0.3px;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  padding:0 14px 16px;
  justify-content:center;
}
.btn{
  font-family:'Raleway',sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:1px;
  padding:10px 22px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  transition:transform 0.1s, opacity 0.1s;
}
.btn:active{transform:scale(0.96);}
.btn-clear{background:var(--purple-bg);color:var(--purple);}
.btn-reset{background:#f0f0f0;color:#666;}
.btn-check{background:var(--purple);color:#fff;}

/* WIN OVERLAY */
.win-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(74,111,227,0.92);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.win-overlay.show{display:flex;}
.win-card{
  background:#fff;
  border-radius:24px;
  padding:40px 32px;
  text-align:center;
  max-width:340px;
  width:100%;
}
.win-title{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--purple);letter-spacing:2px;}
.win-sub{font-size:16px;color:var(--muted);margin:8px 0 24px;}
.win-time{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);}
.win-time-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.btn-play-again{margin-top:24px;background:var(--purple);color:#fff;width:100%;padding:14px;font-size:15px;}
.btn-share{margin-top:10px;background:#000;color:#fff;width:100%;padding:14px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-share::before{content:'𝕏';font-size:16px;}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}
@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
</style>
</head>
<body>

<header>
  <div class="brand">CARCOPHONY</div>
  <h1>CAR SUDOKU</h1>
  <div class="subtitle">PUZZLE #2</div>
</header>

<div class="card">
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Filled</div>
      <div class="stat-value" id="filled-count">0 / 22</div>
    </div>
    <div class="stat">
      <div class="stat-label">Errors</div>
      <div class="stat-value" id="error-count">0</div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="picker-label">Select a car then tap a cell</div>
  <div class="picker" id="picker"></div>

  <div class="controls">
    <button class="btn btn-clear" onclick="clearSelected()">Clear</button>
    <button class="btn btn-reset" onclick="resetPuzzle()">Reset</button>
    <button class="btn btn-check" onclick="checkAll()">Check</button>
  </div>
</div>

<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <div class="win-title">Solved!</div>
    <div class="win-sub">You completed Car Sudoku #1</div>
    <div class="win-time-label">Your Time</div>
    <div class="win-time" id="win-time">0:00</div>
    <button class="btn btn-play-again" onclick="resetPuzzle()">Play Again</button>
    <button class="btn btn-share" onclick="shareToX()">Share on X</button>
  </div>
</div>

const PUZZLE = [[0, 3, -1, -1, -1, -1], [-1, -1, 4, -1, -1, -1], [4, 5, 3, 2, -1, 1], [-1, -1, -1, -1, 3, -1], [3, -1, 5, -1, -1, -1], [-1, 1, -1, 3, -1, 4]]
const SOLUTION = [[0, 3, 1, 5, 4, 2], [5, 2, 4, 0, 1, 3], [4, 5, 3, 2, 0, 1], [1, 0, 2, 4, 3, 5], [3, 4, 5, 1, 2, 0], [2, 1, 0, 3, 5, 4]]

let grid = PUZZLE.map(r => [...r]);
let selected = null;
let selectedCar = null;
let errors = 0;
let seconds = 0;
let timerInterval = null;
let started = false;

function startTimer(){
  if(started) return;
  started = true;
  timerInterval = setInterval(()=>{
    seconds++;
    const m = Math.floor(seconds/60);
    const s = seconds%60;
    document.getElementById('timer').textContent = m+':'+(s<10?'0':'')+s;
  },1000);
}

function buildGrid(){
  const g = document.getElementById('grid');
  g.innerHTML='';
  for(let r=0;r<6;r++){
    for(let c=0;c<6;c++){
      const cell = document.createElement('div');
      cell.className='cell';
      cell.dataset.r=r; cell.dataset.c=c;
      if(c===2) cell.style.marginRight='5px';
      if(r===1||r===3) cell.style.marginBottom='5px';
      g.appendChild(cell);
    }
  }
  renderAllCells();
  g.addEventListener('click', onGridClick);
  updateFilled();
}

function renderAllCells(){
  for(let r=0;r<6;r++) for(let c=0;c<6;c++) renderCell(r,c);
}

function renderCell(r,c){
  const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  const val = grid[r][c];
  const isGiven = PUZZLE[r][c] !== -1;
  cell.innerHTML='';
  cell.className = 'cell' + (isGiven?' given': val!==-1?' filled':' empty');
  if(c===2) cell.style.marginRight='5px';
  if(r===1||r===3) cell.style.marginBottom='5px';
  if(selected === cell) cell.classList.add('selected');
  if(val !== -1){
    const img = document.createElement('img');
    img.src = CARS[val].img;
    img.draggable=false;
    cell.appendChild(img);
    const num = document.createElement('div');
    num.className='cell-num';
    num.textContent = val+1;
    cell.appendChild(num);
  }
}

function buildPicker(){
  const p = document.getElementById('picker');
  p.innerHTML='';
  CARS.forEach((car,i)=>{
    const el = document.createElement('div');
    el.className='pick-car';
    el.dataset.idx=i;
    el.innerHTML=`<img src="${car.img}" draggable="false"><div class="pick-num">${i+1}</div><div class="pick-name">${car.name}</div>`;
    el.addEventListener('click',()=>selectCar(i,el));
    p.appendChild(el);
  });
}

function selectCar(idx, el){
  selectedCar = idx;
  document.querySelectorAll('.pick-car').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  if(selected) placeCar();
}

function onGridClick(e){
  const cell = e.target.closest('.cell');
  if(!cell) return;
  if(cell.classList.contains('given')) return;
  const r = +cell.dataset.r, c = +cell.dataset.c;
  // Deselect if tapping same cell
  if(selected === cell){
    cell.classList.remove('selected');
    selected = null;
    return;
  }
  if(selected) selected.classList.remove('selected');
  selected = cell;
  cell.classList.add('selected');
  // Only auto-place if cell is empty
  if(selectedCar !== null && grid[r][c] === -1) placeCar();
}

function placeCar(){
  if(!selected || selectedCar === null) return;
  startTimer();
  const r = +selected.dataset.r, c = +selected.dataset.c;
  if(PUZZLE[r][c] !== -1) return;

  // Check validity
  const valid = isValid(r, c, selectedCar);
  grid[r][c] = selectedCar;

  const placedCell = selected;
  selected = null;
  renderCell(r,c);
  placedCell.classList.remove('selected');

  if(!valid){
    errors++;
    document.getElementById('error-count').textContent=errors;
    placedCell.classList.add('error');
    setTimeout(()=>placedCell.classList.remove('error'),600);
  }
  updateFilled();
  checkWin();
}

function isValid(r, c, val){
  // Row
  for(let cc=0;cc<6;cc++) if(cc!==c && grid[r][cc]===val) return false;
  // Col
  for(let rr=0;rr<6;rr++) if(rr!==r && grid[rr][c]===val) return false;
  // Box
  const br=Math.floor(r/2)*2, bc=Math.floor(c/3)*3;
  for(let rr=br;rr<br+2;rr++) for(let cc=bc;cc<bc+3;cc++)
    if((rr!==r||cc!==c) && grid[rr][cc]===val) return false;
  return true;
}

function clearSelected(){
  if(!selected) return;
  const r=+selected.dataset.r, c=+selected.dataset.c;
  if(PUZZLE[r][c]!==-1) return;
  grid[r][c]=-1;
  const cell = selected;
  selected = null;
  renderCell(r,c);
  updateFilled();
}

function resetPuzzle(){
  grid = PUZZLE.map(r=>[...r]);
  selected=null; selectedCar=null; errors=0; seconds=0; started=false;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent='0:00';
  document.getElementById('error-count').textContent='0';
  document.querySelectorAll('.pick-car').forEach(e=>e.classList.remove('active'));
  document.getElementById('win-overlay').classList.remove('show');
  buildGrid();
}

function checkAll(){
  let allCorrect = true;
  for(let r=0;r<6;r++) for(let c=0;c<6;c++){
    if(grid[r][c] !== SOLUTION[r][c]){ allCorrect=false; break; }
  }
  if(allCorrect && grid.flat().indexOf(-1)===-1){
    showWin();
  } else {
    // Flash errors
    for(let r=0;r<6;r++) for(let c=0;c<6;c++){
      if(PUZZLE[r][c]===-1 && grid[r][c]!==-1 && grid[r][c]!==SOLUTION[r][c]){
        const cells = document.querySelectorAll('.cell');
        const cell = cells[r*6+c];
        cell.classList.add('error');
        setTimeout(()=>cell.classList.remove('error'),800);
      }
    }
  }
}

function checkWin(){
  if(grid.flat().indexOf(-1)!==-1) return;
  for(let r=0;r<6;r++) for(let c=0;c<6;c++)
    if(grid[r][c]!==SOLUTION[r][c]) return;
  setTimeout(showWin, 400);
}

function showWin(){
  clearInterval(timerInterval);
  const m=Math.floor(seconds/60), s=seconds%60;
  document.getElementById('win-time').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('win-overlay').classList.add('show');
}

function updateFilled(){
  const filled = grid.flat().filter(v=>v!==-1).length - 14;
  document.getElementById('filled-count').textContent=Math.max(0,filled)+' / 22';
}

function shareToX(){
  const m = Math.floor(seconds/60);
  const s = seconds%60;
  const time = m+':'+(s<10?'0':'')+s;
  const blanks = 22;
  const errTxt = errors===0 ? 'No errors!' : errors===1 ? '1 error' : errors+' errors';
  const tweet = `I solved Car Sudoku #2 by @carcophony in ${time} — ${errTxt}\n\nCan you beat me? 🏎\ncarcophony.github.io/car-sudoku\n\n#CarSudoku #Carcophony`;
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(tweet);
  window.open(url, '_blank');
}

buildGrid();
buildPicker();
</script>
